<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNI Hair Shop — 後台管理</title>
<style>
:root {
  --bg: #f5f5f5; --surface: #fff; --border: #ddd;
  --gold: #c4a882; --gold-dark: #a08660; --text: #2a2420;
  --muted: #888; --red: #c0392b; --green: #27ae60; --blue: #2980b9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: sans-serif; }
.topbar { background: var(--text); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 16px; letter-spacing: 2px; }
.tabs { display: flex; background: var(--surface); border-bottom: 2px solid var(--border); padding: 0 20px; overflow-x: auto; }
.tab { padding: 12px 18px; cursor: pointer; font-size: 13px; white-space: nowrap; border-bottom: 3px solid transparent; margin-bottom: -2px; }
.tab.active { border-bottom-color: var(--gold); color: var(--gold-dark); font-weight: 600; }
.content { padding: 20px; max-width: 1100px; margin: 0 auto; }
.panel { display: none; }
.panel.active { display: block; }
.card { background: var(--surface); border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--gold-dark); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f9f9f9; padding: 10px 8px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); }
td { padding: 10px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
tr:hover td { background: #fafafa; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-ok { background: #e8f5e9; color: var(--green); }
.badge-warn { background: #fff3e0; color: #e65100; }
.badge-red { background: #fdecea; color: var(--red); }
.badge-black { background: #2a2420; color: white; }
.btn { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-primary { background: var(--text); color: white; }
.btn-gold { background: var(--gold); color: white; }
.btn-red { background: var(--red); color: white; }
.btn-green { background: var(--green); color: white; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 10px; font-size: 13px; outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--gold); }
.msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; display: none; }
.msg-ok { background: #e8f5e9; color: var(--green); }
.msg-err { background: #fdecea; color: var(--red); }
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
.slider:before { position: absolute; content: ''; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s; }
input:checked + .slider { background: var(--green); }
input:checked + .slider:before { transform: translateX(16px); }
.loading { text-align: center; padding: 40px; color: var(--muted); }
.filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.filter-row input, .filter-row select { border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; }
.time-range-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.time-range-row select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; font-size: 13px; }
#restTimeArea { display: none; margin-top: 10px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>UNI HAIR SHOP 後台</h1>
  <span id="topTime" style="font-size:12px;opacity:0.7"></span>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('bookings')">📅 預約管理</div>
  <div class="tab" onclick="switchTab('services')">✂️ 服務項目</div>
  <div class="tab" onclick="switchTab('customers')">👥 顧客回訪</div>
  <div class="tab" onclick="switchTab('blacklist')">🚫 黑名單</div>
  <div class="tab" onclick="switchTab('schedule')">🗓 排程設定</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ 系統設定</div>
</div>
<div class="content">

  <!-- 預約管理 -->
  <div class="panel active" id="panel-bookings">
    <div class="card">
      <div class="card-title">預約列表</div>
      <div class="filter-row">
        <input type="date" id="bookingDate" onchange="loadBookings()">
        <button class="btn btn-primary" onclick="loadBookings()">查詢</button>
        <button class="btn btn-gold" onclick="document.getElementById('bookingDate').value='';loadBookings()">全部</button>
      </div>
      <div id="bookingList"><div class="loading">選擇日期查詢預約</div></div>
    </div>
  </div>

  <!-- 服務項目 -->
  <div class="panel" id="panel-services">
    <div class="card">
      <div class="card-title">新增服務項目</div>
      <div id="msgAddSvc" class="msg"></div>
      <div class="form-row-4">
        <div class="form-group"><label>ID（英文唯一）*</label><input id="newSvcId" placeholder="例：hair_check2"></div>
        <div class="form-group"><label>分類 *</label><input id="newSvcCat" placeholder="例：質髮中心健檢"></div>
        <div class="form-group"><label>服務名稱 *</label><input id="newSvcName" placeholder="例：髮質健檢Plus"></div>
        <div class="form-group"><label>價格 *</label><input id="newSvcPrice" placeholder="例：$800"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>時長（分鐘，-1=依髮況）</label><input id="newSvcDuration" type="number" placeholder="30" value="30"></div>
        <div class="form-group"><label>備註</label><input id="newSvcNote" placeholder="選填"></div>
        <div class="form-group"><label>啟用</label>
          <select id="newSvcActive"><option value="true">啟用</option><option value="false">停用</option></select>
        </div>
      </div>
      <button class="btn btn-gold" onclick="addService()">新增服務</button>
    </div>
    <div class="card">
      <div class="card-title">服務列表</div>
      <div id="msgSvc" class="msg"></div>
      <div id="serviceList"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- 顧客回訪 -->
  <div class="panel" id="panel-customers">
    <div class="card">
      <div class="card-title">顧客回訪管理</div>
      <div class="filter-row">
        <input type="text" id="customerSearch" placeholder="搜尋名稱或UID" oninput="filterCustomers()">
        <select id="customerFilter" onchange="filterCustomers()">
          <option value="">全部狀態</option>
          <option value="未發送">未發送</option>
          <option value="已完成">已完成</option>
        </select>
      </div>
      <div id="customerList"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- 黑名單 -->
  <div class="panel" id="panel-blacklist">
    <div class="card">
      <div class="card-title">新增黑名單</div>
      <div id="msgBlacklist" class="msg"></div>
      <div class="form-row-4">
        <div class="form-group"><label>電話 *</label><input id="blPhone" placeholder="09xxxxxxxx"></div>
        <div class="form-group"><label>姓名</label><input id="blName" placeholder="選填"></div>
        <div class="form-group"><label>分類 *</label>
          <select id="blCategory">
            <option value="爽約慣犯">爽約慣犯</option>
            <option value="騷擾客">騷擾客</option>
            <option value="拒絕服務">拒絕服務</option>
            <option value="備註觀察">備註觀察</option>
          </select>
        </div>
        <div class="form-group"><label>備註</label><input id="blRemark" placeholder="選填說明"></div>
      </div>
      <button class="btn btn-red" onclick="addBlacklist()">加入黑名單</button>
    </div>
    <div class="card">
      <div class="card-title">黑名單列表</div>
      <div id="blacklistList"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- 排程設定 -->
  <div class="panel" id="panel-schedule">
    <div class="card">
      <div class="card-title">新增公休／特殊休息時段</div>
      <div id="msgSchedule" class="msg"></div>
      <div class="form-row">
        <div class="form-group"><label>日期</label><input type="date" id="schedDate"></div>
        <div class="form-group"><label>類型</label>
          <select id="schedType" onchange="toggleRestTime()">
            <option value="closed">公休（整天關閉）</option>
            <option value="rest">特殊休息時段</option>
          </select>
        </div>
      </div>
      <div id="restTimeArea">
        <div class="form-group"><label>休息時段（開始 → 結束）</label>
          <div class="time-range-row">
            <select id="restStart"></select>
            <span>至</span>
            <select id="restEnd"></select>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px"><label>備註</label><input id="schedNote" placeholder="選填說明"></div>
      <button class="btn btn-gold" style="margin-top:12px" onclick="addSchedule()">新增</button>
    </div>
    <div class="card">
      <div class="card-title">排程列表</div>
      <div id="scheduleList"><div class="loading">載入中...</div></div>
    </div>
    <div class="card">
      <div class="card-title">手動鎖定時段</div>
      <div id="msgLock" class="msg"></div>
      <div class="form-row">
        <div class="form-group"><label>日期</label><input type="date" id="lockDate"></div>
        <div class="form-group"><label>時段</label>
          <select id="lockTime"></select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px"><label>備註</label><input id="lockNote" placeholder="例：保留給加價客"></div>
      <button class="btn btn-red btn-sm" onclick="lockSlot()">鎖定時段</button>
      <div id="lockedList" style="margin-top:16px"></div>
    </div>
  </div>

  <!-- 系統設定 -->
  <div class="panel" id="panel-settings">
    <div class="card">
      <div class="card-title">系統設定</div>
      <div id="msgSettings" class="msg"></div>
      <div id="settingsList"><div class="loading">載入中...</div></div>
    </div>
  </div>

</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyG9T1UodoV3Zzag9OtC7SQDTiS3DfsqZFE1i7PrXSGxg_AW5C_GvOcmVgNOvlL3g6WQQ/exec';

let allCustomers = [];

// 時段選項
const ALL_SLOTS = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00'];

function initSlotSelects() {
  ['restStart','restEnd','lockTime'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = ALL_SLOTS.map(t => `<option value="${t}">${t}</option>`).join('');
  });
  const restEnd = document.getElementById('restEnd');
  if (restEnd) restEnd.value = '13:00';
}

function toggleRestTime() {
  const type = document.getElementById('schedType').value;
  document.getElementById('restTimeArea').style.display = type === 'rest' ? 'block' : 'none';
}

setInterval(() => {
  const n = new Date();
  document.getElementById('topTime').textContent =
    n.toLocaleDateString('zh-TW') + ' ' + n.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
}, 1000);

window.onload = function() {
  initSlotSelects();
};

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const tabs = ['bookings','services','customers','blacklist','schedule','settings'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'services')   loadServices();
  if (name === 'customers')  loadCustomers();
  if (name === 'blacklist')  loadBlacklist();
  if (name === 'schedule')   { loadSchedule(); loadLockedSlots(); }
  if (name === 'settings')   loadSettings();
}

async function api(params) {
  const url = GAS + '?' + new URLSearchParams(params).toString() + '&t=' + Date.now();
  const res = await fetch(url, { cache: 'no-store' });
  return res.json();
}

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// ── 預約管理 ──
async function loadBookings() {
  const date = document.getElementById('bookingDate').value;
  const el = document.getElementById('bookingList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const params = { action: 'getBookings' };
    if (date) params.date = date;
    const data = await api(params);
    const bookings = data.bookings || [];
    if (!bookings.length) { el.innerHTML = '<div class="loading">無預約資料</div>'; return; }
    el.innerHTML = '<table><thead><tr><th>編號</th><th>日期</th><th>時間</th><th>姓名</th><th>電話</th><th>服務</th><th>備註</th><th>加價</th><th>狀態</th><th>操作</th></tr></thead><tbody>' +
      bookings.map(b => '<tr>' +
        '<td style="font-size:11px">' + b.id + '</td>' +
        '<td>' + b.date + '</td>' +
        '<td><strong>' + b.time + '</strong></td>' +
        '<td>' + b.name + '</td>' +
        '<td>' + b.phone + '</td>' +
        '<td>' + b.service + '</td>' +
        '<td style="font-size:11px">' + (b.note||'') + '</td>' +
        '<td>' + (b.priority ? '✅' : '') + '</td>' +
        '<td><span class="badge ' + (b.status==='已確認'?'badge-ok':b.status==='已取消'?'badge-red':'badge-warn') + '">' + b.status + '</span></td>' +
        '<td>' +
          '<button class="btn btn-green btn-sm" style="margin-right:4px" onclick="updateBooking(\'' + b.id + '\',\'已確認\')">確認</button>' +
          '<button class="btn btn-red btn-sm" onclick="updateBooking(\'' + b.id + '\',\'已取消\')">取消</button>' +
        '</td></tr>'
      ).join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

async function updateBooking(id, status) {
  await api({ action: 'updateBooking', id, status });
  loadBookings();
}

// ── 服務項目 ──
async function loadServices() {
  const el = document.getElementById('serviceList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const data = await api({ action: 'getServices' });
    const svcs = data.services || [];
    el.innerHTML = '<table><thead><tr><th>ID</th><th>分類</th><th>名稱</th><th>價格</th><th>時長</th><th>備註</th><th>啟用</th><th>操作</th></tr></thead><tbody>' +
      svcs.map(s => '<tr id="srow_' + s.id + '">' +
        '<td style="font-size:11px">' + s.id + '</td>' +
        '<td><input style="width:90px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + s.category + '" id="cat_' + s.id + '"></td>' +
        '<td><input style="width:110px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + s.name + '" id="name_' + s.id + '"></td>' +
        '<td><input style="width:80px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + s.price + '" id="price_' + s.id + '"></td>' +
        '<td><input style="width:60px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" type="number" value="' + s.duration + '" id="dur_' + s.id + '"></td>' +
        '<td><input style="width:120px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + s.note + '" id="note_' + s.id + '"></td>' +
        '<td><label class="toggle"><input type="checkbox" ' + (s.active?'checked':'') + ' id="act_' + s.id + '"><span class="slider"></span></label></td>' +
        '<td><button class="btn btn-gold btn-sm" onclick="saveService(\'' + s.id + '\')">儲存</button></td>' +
      '</tr>').join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

async function saveService(id) {
  const params = {
    action: 'updateService', id,
    category: document.getElementById('cat_'   + id).value,
    name:     document.getElementById('name_'  + id).value,
    price:    document.getElementById('price_' + id).value,
    duration: document.getElementById('dur_'   + id).value,
    note:     document.getElementById('note_'  + id).value,
    active:   document.getElementById('act_'   + id).checked ? 'true' : 'false',
  };
  const data = await api(params);
  showMsg('msgSvc', data.status === 'ok' ? '✅ 已儲存' : '❌ ' + data.msg, data.status === 'ok');
}

async function addService() {
  const id       = document.getElementById('newSvcId').value.trim();
  const category = document.getElementById('newSvcCat').value.trim();
  const name     = document.getElementById('newSvcName').value.trim();
  const price    = document.getElementById('newSvcPrice').value.trim();
  const duration = document.getElementById('newSvcDuration').value.trim();
  const note     = document.getElementById('newSvcNote').value.trim();
  const active   = document.getElementById('newSvcActive').value;
  if (!id || !category || !name || !price) { showMsg('msgAddSvc', '❌ 請填寫必填欄位', false); return; }
  const data = await api({ action: 'addService', id, category, name, price, duration, note, active });
  if (data.status === 'ok') {
    showMsg('msgAddSvc', '✅ 新增成功', true);
    ['newSvcId','newSvcName','newSvcPrice','newSvcNote'].forEach(i => document.getElementById(i).value = '');
    loadServices();
  } else { showMsg('msgAddSvc', '❌ ' + data.msg, false); }
}

// ── 顧客回訪 ──
async function loadCustomers() {
  const el = document.getElementById('customerList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const data = await api({ action: 'getCustomers' });
    allCustomers = data.customers || [];
    renderCustomers(allCustomers);
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

function filterCustomers() {
  const search = document.getElementById('customerSearch').value.toLowerCase();
  const filter = document.getElementById('customerFilter').value;
  let list = allCustomers;
  if (search) list = list.filter(c => (c.lineName+c.userId).toLowerCase().includes(search));
  if (filter) list = list.filter(c => c.status === filter);
  renderCustomers(list);
}

function renderCustomers(list) {
  const el = document.getElementById('customerList');
  if (!list.length) { el.innerHTML = '<div class="loading">無資料</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = '<table><thead><tr><th>LINE名稱</th><th>UID</th><th>服務項目</th><th>客型</th><th>下次回訪日</th><th>狀態</th><th>備註</th><th>操作</th></tr></thead><tbody>' +
    list.map(c => {
      const fd = c.followDate ? new Date(c.followDate) : null;
      fd && fd.setHours(0,0,0,0);
      const diff = fd ? Math.floor((today - fd) / 86400000) : 0;
      const urgent = diff > 0;
      return '<tr>' +
        '<td>' + (c.lineName || '—') + '</td>' +
        '<td style="font-size:10px">' + c.userId.substring(0,12) + '...</td>' +
        '<td><input style="width:100px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + c.service + '" id="csvc_' + c.rowIndex + '"></td>' +
        '<td><select style="border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" id="ctype_' + c.rowIndex + '">' +
          ['新客','熟客','VIP'].map(t => '<option ' + (c.customerType===t?'selected':'') + '>' + t + '</option>').join('') + '</select></td>' +
        '<td><input type="date" style="border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + (c.followDate||'') + '" id="cdate_' + c.rowIndex + '"></td>' +
        '<td>' + (urgent ? '<span class="badge badge-red">🔥 逾期' + diff + '天</span>' : '<span class="badge badge-ok">' + (c.status||'未發送') + '</span>') + '</td>' +
        '<td><input style="width:100px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + (c.remark||'') + '" id="cremark_' + c.rowIndex + '"></td>' +
        '<td><button class="btn btn-gold btn-sm" onclick="saveCustomer(' + c.rowIndex + ')">儲存</button></td>' +
      '</tr>';
    }).join('') + '</tbody></table>';
}

async function saveCustomer(rowIndex) {
  const data = await api({
    action: 'updateCustomer', rowIndex,
    service:      document.getElementById('csvc_'    + rowIndex).value,
    customerType: document.getElementById('ctype_'   + rowIndex).value,
    followDate:   document.getElementById('cdate_'   + rowIndex).value,
    remark:       document.getElementById('cremark_' + rowIndex).value,
  });
  if (data.status === 'ok') alert('✅ 已儲存');
  else alert('❌ ' + data.msg);
}

// ── 黑名單 ──
async function loadBlacklist() {
  const el = document.getElementById('blacklistList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const data = await api({ action: 'getBlacklist' });
    const list = data.list || [];
    if (!list.length) { el.innerHTML = '<div class="loading">黑名單為空</div>'; return; }
    el.innerHTML = '<table><thead><tr><th>電話</th><th>姓名</th><th>分類</th><th>備註</th><th>自訂提示文字</th><th>建立時間</th><th>操作</th></tr></thead><tbody>' +
      list.map(b => '<tr>' +
        '<td>' + b.phone + '</td>' +
        '<td><input style="width:70px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + (b.name||'') + '" id="blname_' + b.rowIndex + '"></td>' +
        '<td><select style="border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" id="blcat_' + b.rowIndex + '">' +
          ['爽約慣犯','騷擾客','拒絕服務','備註觀察'].map(t => '<option ' + (b.category===t?'selected':'') + '>' + t + '</option>').join('') + '</select></td>' +
        '<td><input style="width:100px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + (b.remark||'') + '" id="blremark_' + b.rowIndex + '"></td>' +
        '<td><input style="width:200px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px" value="' + (b.customMsg||'') + '" placeholder="預設：請改由 Elsa 為您現場安排預約" id="blmsg_' + b.rowIndex + '"></td>' +
        '<td style="font-size:11px">' + (b.createdAt||'') + '</td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn btn-gold btn-sm" style="margin-right:4px" onclick="saveBlacklist(' + b.rowIndex + ')">儲存</button>' +
          '<button class="btn btn-green btn-sm" onclick="removeBlacklist(' + b.rowIndex + ')">移除</button>' +
        '</td></tr>'
      ).join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

async function addBlacklist() {
  const phone    = document.getElementById('blPhone').value.trim();
  const name     = document.getElementById('blName').value.trim();
  const category = document.getElementById('blCategory').value;
  const remark   = document.getElementById('blRemark').value.trim();
  if (!phone) { showMsg('msgBlacklist', '❌ 請輸入電話', false); return; }
  const data = await api({ action: 'addBlacklist', phone, name, category, remark });
  if (data.status === 'ok') {
    showMsg('msgBlacklist', '✅ 已加入黑名單', true);
    ['blPhone','blName','blRemark'].forEach(i => document.getElementById(i).value = '');
    loadBlacklist();
  } else { showMsg('msgBlacklist', '❌ ' + data.msg, false); }
}

async function saveBlacklist(rowIndex) {
  const data = await api({
    action: 'updateBlacklist', rowIndex,
    name:      document.getElementById('blname_'   + rowIndex).value,
    category:  document.getElementById('blcat_'    + rowIndex).value,
    remark:    document.getElementById('blremark_' + rowIndex).value,
    customMsg: document.getElementById('blmsg_'    + rowIndex).value,
  });
  if (data.status === 'ok') alert('✅ 已儲存');
  else alert('❌ ' + data.msg);
}

async function removeBlacklist(rowIndex) {
  if (!confirm('確定移除此黑名單？')) return;
  const data = await api({ action: 'removeBlacklist', rowIndex });
  if (data.status === 'ok') loadBlacklist();
  else alert('❌ ' + data.msg);
}

// ── 排程 ──
async function loadSchedule() {
  const el = document.getElementById('scheduleList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const data = await api({ action: 'getSchedule' });
    const list = data.schedule || [];
    if (!list.length) { el.innerHTML = '<div class="loading">無排程設定</div>'; return; }
    el.innerHTML = '<table><thead><tr><th>日期</th><th>類型</th><th>時段</th><th>備註</th><th>操作</th></tr></thead><tbody>' +
      list.map(s => '<tr>' +
        '<td>' + s.date + '</td>' +
        '<td><span class="badge ' + (s.type==='closed'?'badge-red':'badge-warn') + '">' + (s.type==='closed'?'公休':'特殊休息') + '</span></td>' +
        '<td>' + (s.time||'—') + '</td>' +
        '<td>' + (s.note||'') + '</td>' +
        '<td><button class="btn btn-red btn-sm" onclick="removeSchedule(\'' + s.date + '\',\'' + s.type + '\')">刪除</button></td>' +
      '</tr>').join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

async function addSchedule() {
  const date  = document.getElementById('schedDate').value;
  const type  = document.getElementById('schedType').value;
  const note  = document.getElementById('schedNote').value;
  if (!date) { showMsg('msgSchedule', '❌ 請選擇日期', false); return; }
  let time = '';
  if (type === 'rest') {
    const start = document.getElementById('restStart').value;
    const end   = document.getElementById('restEnd').value;
    if (start >= end) { showMsg('msgSchedule', '❌ 結束時間必須晚於開始時間', false); return; }
    time = start + '-' + end;
  }
  const data = await api({ action: 'updateSchedule', date, type, time, note });
  if (data.status === 'ok') { showMsg('msgSchedule', '✅ 已新增', true); loadSchedule(); }
  else showMsg('msgSchedule', '❌ ' + data.msg, false);
}

async function removeSchedule(date, type) {
  if (!confirm('確定刪除此排程？')) return;
  await api({ action: 'updateSchedule', date, type, remove: 'true' });
  loadSchedule();
}

async function loadLockedSlots() {
  const data = await api({ action: 'getLockedSlots' });
  const slots = data.slots || [];
  const el = document.getElementById('lockedList');
  if (!slots.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px">目前無鎖定時段</div>'; return; }
  el.innerHTML = '<table><thead><tr><th>日期</th><th>時段</th><th>備註</th><th>操作</th></tr></thead><tbody>' +
    slots.map(s => '<tr><td>' + s.date + '</td><td>' + s.time + '</td><td style="font-size:11px">' + (s.note||'') + '</td>' +
      '<td><button class="btn btn-green btn-sm" onclick="unlockSlot(\'' + s.date + '\',\'' + s.time + '\')">解鎖</button></td></tr>'
    ).join('') + '</tbody></table>';
}

async function lockSlot() {
  const date = document.getElementById('lockDate').value;
  const time = document.getElementById('lockTime').value;
  const note = document.getElementById('lockNote').value;
  if (!date) { showMsg('msgLock', '❌ 請選擇日期', false); return; }
  const data = await api({ action: 'lockSlot', date, time, note });
  if (data.status === 'ok') { showMsg('msgLock', '✅ 已鎖定', true); loadLockedSlots(); }
  else showMsg('msgLock', '❌ ' + data.msg, false);
}

async function unlockSlot(date, time) {
  await api({ action: 'unlockSlot', date, time });
  loadLockedSlots();
}

// ── 系統設定 ──
async function loadSettings() {
  const el = document.getElementById('settingsList');
  el.innerHTML = '<div class="loading">載入中...</div>';
  try {
    const data = await api({ action: 'getSettings' });
    const settings = data.settings || [];
    el.innerHTML = '<table><thead><tr><th>設定名稱</th><th>說明</th><th>值</th><th>操作</th></tr></thead><tbody>' +
      settings.map(s => '<tr>' +
        '<td style="font-size:11px">' + s.key + '</td>' +
        '<td style="font-size:12px">' + (s.label||'') + '</td>' +
        '<td><input style="width:200px;border:1px solid #ddd;border-radius:4px;padding:4px 8px;font-size:13px" value="' + s.value + '" id="setting_' + s.key + '"></td>' +
        '<td><button class="btn btn-gold btn-sm" onclick="saveSetting(\'' + s.key + '\')">儲存</button></td>' +
      '</tr>').join('') + '</tbody></table>';
  } catch(e) { el.innerHTML = '<div class="loading" style="color:red">載入失敗</div>'; }
}

async function saveSetting(key) {
  const value = document.getElementById('setting_' + key).value;
  const data = await api({ action: 'updateSettings', key, value });
  showMsg('msgSettings', data.status === 'ok' ? '✅ 已儲存' : '❌ ' + data.msg, data.status === 'ok');
}
</script>
