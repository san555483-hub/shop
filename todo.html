<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>UNI 進度追蹤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf8f5;
  --surface: #ffffff;
  --border: #e8e0d5;
  --gold: #c4a882;
  --gold-dark: #a08660;
  --text: #2a2420;
  --muted: #8a7d72;
  --light: #f0ebe4;
  --red: #c0392b;
  --pin: #e67e22;
  --done: #95a5a6;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  padding-bottom: 100px;
  font-size: 14px;
  line-height: 1.6;
}

/* 頂部 */
.header {
  background: var(--text);
  color: white;
  text-align: center;
  padding: 24px 20px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.header-logo {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.header-sub { font-size: 11px; letter-spacing: 2px; opacity: 0.6; }

/* 容器 */
.container { max-width: 520px; margin: 0 auto; padding: 16px; }

/* 區塊標題 */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 8px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 1px;
}
.section-title:first-child { margin-top: 8px; }
.section-title .count {
  background: var(--light);
  color: var(--muted);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: auto;
  font-weight: 500;
}

/* 任務卡片 */
.todo-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: all 0.2s;
}
.todo-card.pinned {
  border-color: var(--pin);
  background: #fff8f0;
}
.todo-card.done {
  opacity: 0.6;
  background: var(--light);
}
.todo-card.done .todo-title {
  text-decoration: line-through;
  color: var(--muted);
}

.todo-checkbox {
  width: 22px;
  height: 22px;
  border: 2px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.2s;
  background: var(--surface);
  margin-top: 1px;
}
.todo-checkbox:active { transform: scale(0.9); }
.todo-card.done .todo-checkbox {
  background: var(--gold);
  border-color: var(--gold);
  color: white;
}

.todo-content { flex: 1; min-width: 0; }
.todo-tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--light);
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 500;
  letter-spacing: 0.5px;
}
.todo-tag.red { background: #fde6e4; color: #c0392b; }
.todo-tag.blue { background: #e3f2fd; color: #1976d2; }
.todo-tag.purple { background: #f3e5f5; color: #7b1fa2; }
.todo-tag.gray { background: var(--light); color: var(--muted); }
.todo-title {
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  color: var(--text);
}
.todo-note {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.5;
}
.todo-time {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  opacity: 0.7;
}

.todo-actions { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
.todo-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.todo-btn:active { transform: scale(0.9); }
.todo-btn:hover { background: var(--light); }
.todo-btn.pin { color: var(--pin); }
.todo-btn.del { color: var(--red); opacity: 0.5; }
.todo-btn.del:hover { opacity: 1; }

/* 空狀態 */
.empty-state {
  text-align: center;
  padding: 30px 20px;
  color: var(--muted);
  font-size: 13px;
  background: var(--surface);
  border: 1.5px dashed var(--border);
  border-radius: 10px;
}

/* 新增按鈕（浮動在底部） */
.add-btn {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(42,36,32,0.3);
  letter-spacing: 2px;
  transition: all 0.2s;
  z-index: 50;
}
.add-btn:active { transform: translateX(-50%) scale(0.95); }

/* 彈窗 */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.2s;
}
.modal-overlay.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 520px;
  border-radius: 16px 16px 0 0;
  padding: 24px 20px 32px;
  animation: slideUp 0.3s;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 16px;
  text-align: center;
}
.modal-group { margin-bottom: 14px; }
.modal-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.modal-input, .modal-select, .modal-textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: var(--gold); }
.modal-textarea { resize: none; height: 70px; line-height: 1.5; }

.tag-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.tag-option {
  padding: 8px 14px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.2s;
}
.tag-option.selected {
  border-color: var(--gold);
  background: #fdf6ee;
  color: var(--gold-dark);
  font-weight: 500;
}

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.btn-primary { background: var(--text); color: white; }
.btn-secondary { background: var(--light); color: var(--muted); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* 載入 */
.loading-screen {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast 提示 */
.toast {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 13px;
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; }

/* 匯入工具按鈕（在 header 右上角） */
.tool-btn {
  position: absolute;
  top: 20px; right: 16px;
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.tool-btn:active { transform: scale(0.9); }
.tool-btn:hover { background: rgba(255,255,255,0.2); }

/* 匯入彈窗的 textarea */
.import-textarea {
  width: 100%;
  min-height: 200px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  font-family: 'Consolas', 'Monaco', monospace;
  background: #f8f5f0;
  color: var(--text);
  outline: none;
  resize: vertical;
  line-height: 1.5;
}
.import-textarea:focus { border-color: var(--gold); }
.import-hint {
  font-size: 11px;
  color: var(--muted);
  background: #fdf8f0;
  border: 1px solid #e8d5b0;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 12px;
  line-height: 1.7;
}
.import-progress {
  font-size: 12px;
  color: var(--gold-dark);
  margin-top: 8px;
  display: none;
}

/* 搜尋 + 篩選區 */
.filter-bar {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 14px;
}
.search-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
  margin-bottom: 8px;
}
.search-input:focus { border-color: var(--gold); }
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 11px;
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 11px;
  cursor: pointer;
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
  user-select: none;
}
.filter-chip.active {
  border-color: var(--gold);
  background: var(--gold);
  color: white;
  font-weight: 500;
}
.filter-chip.active.red { background: #c0392b; border-color: #c0392b; }
.filter-chip.active.blue { background: #1976d2; border-color: #1976d2; }
.filter-chip.active.purple { background: #7b1fa2; border-color: #7b1fa2; }
.filter-clear {
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  margin-left: auto;
  padding: 4px 8px;
  text-decoration: underline;
  display: none;
}

/* 任務可點擊樣式（編輯用） */
.todo-content { cursor: pointer; }
.todo-content:active { opacity: 0.7; }

/* 複製按鈕 */
.todo-btn.copy { color: var(--gold-dark); }

/* 編輯模式標題 */
.modal-title.edit-mode::before { content: "✏️ "; }

/* 刪除按鈕在編輯彈窗 */
.btn-danger {
  background: #fee;
  color: var(--red);
  border: 1px solid #f5c6c2;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">📋 UNI 進度追蹤</div>
  <div class="header-sub">TASK MANAGER</div>
  <button class="tool-btn" onclick="openClaudeModal()" title="產生 Claude 指令" style="right:60px;">💬</button>
  <button class="tool-btn" onclick="openImportModal()" title="批次匯入">📥</button>
</div>

<div class="container" id="mainContainer">
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div>載入中...</div>
  </div>
  <div id="todoContent" style="display:none;">
    <!-- 搜尋 + 篩選 -->
    <div class="filter-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜尋任務標題或備註...">
      <div class="filter-chips">
        <span class="filter-chip red" data-filter="🔴 主系統">🔴 主系統</span>
        <span class="filter-chip blue" data-filter="🔵 購物">🔵 購物</span>
        <span class="filter-chip purple" data-filter="🟣 尊爵">🟣 尊爵</span>
        <span class="filter-chip" data-filter="⚙️ 設定">⚙️ 設定</span>
        <span class="filter-chip" data-filter="💡 想法">💡 想法</span>
        <span class="filter-clear" id="filterClear" onclick="clearAllFilters()">✕ 清除</span>
      </div>
    </div>

    <!-- 置頂區 -->
    <div id="pinnedSection" style="display:none;">
      <div class="section-title">
        🔥 今天必做
        <span class="count" id="pinnedCount">0</span>
      </div>
      <div id="pinnedList"></div>
    </div>

    <!-- 待辦區 -->
    <div>
      <div class="section-title">
        📋 待辦
        <span class="count" id="todoCount">0</span>
      </div>
      <div id="todoList"></div>
    </div>

    <!-- 已完成區 -->
    <div id="doneSection" style="display:none;">
      <div class="section-title" style="margin-top:28px;opacity:0.7;">
        ✅ 已完成
        <span class="count" id="doneCount">0</span>
      </div>
      <div id="doneList"></div>
    </div>
  </div>
</div>

<!-- 新增按鈕 -->
<button class="add-btn" onclick="openAddModal()">➕ 新增任務</button>

<!-- 新增/編輯彈窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新增任務</div>
    <div class="modal-group">
      <label class="modal-label">任務標題 *</label>
      <input type="text" class="modal-input" id="inputTitle" placeholder="例如：修改 admin 首頁...">
    </div>
    <div class="modal-group">
      <label class="modal-label">系統標籤</label>
      <div class="tag-group" id="tagGroup">
        <div class="tag-option" data-tag="🔴 主系統">🔴 主系統</div>
        <div class="tag-option" data-tag="🔵 購物">🔵 購物</div>
        <div class="tag-option" data-tag="🟣 尊爵">🟣 尊爵</div>
        <div class="tag-option" data-tag="⚙️ 設定">⚙️ 設定</div>
        <div class="tag-option" data-tag="💡 想法">💡 想法</div>
      </div>
    </div>
    <div class="modal-group">
      <label class="modal-label">備註（可填）</label>
      <textarea class="modal-textarea" id="inputNote" placeholder="細節、網址或注意事項..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" id="editDeleteBtn" onclick="deleteFromEdit()" style="display:none;">刪除</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveTodo()">儲存</button>
    </div>
  </div>
</div>

<!-- 批次匯入彈窗 -->
<div class="modal-overlay" id="importModalOverlay">
  <div class="modal">
    <div class="modal-title">📥 批次匯入任務</div>
    <div class="import-hint">
      💡 貼上 Claude 給的 JSON 清單 → 點匯入<br>
      ✨ 支援 status="done" / pinned=true 等欄位
    </div>
    <textarea class="import-textarea" id="importText" placeholder='[
  {
    "title": "任務標題",
    "tag": "🔴 主系統",
    "note": "備註",
    "status": "done"
  }
]'></textarea>
    <div class="import-progress" id="importProgress"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
      <button class="btn btn-primary" id="importBtn" onclick="doImport()">匯入</button>
    </div>
  </div>
</div>

<!-- 💬 產生 Claude 指令彈窗 -->
<div class="modal-overlay" id="claudeModalOverlay">
  <div class="modal">
    <div class="modal-title">💬 產生 Claude 指令</div>
    <div class="import-hint">
      📋 自動產出可直接貼到新對話的指令<br>
      ✨ 包含工作原則、API、今日進度摘要
    </div>
    <textarea class="import-textarea" id="claudeText" readonly style="min-height:280px;font-size:11px;"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeClaudeModal()">關閉</button>
      <button class="btn btn-primary" id="copyClaudeBtn" onclick="copyClaudeText()">📋 複製</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDhISu2Gv5EEc0-4utuD2_6SxPM0ihpR7RlgIwl5W1D42xzZzYgjS0nfqWUQk-XYOIdw/exec';

let todos = [];
let editingId = null;
let selectedTag = '';
let activeFilters = [];  // 當前啟用的分類篩選（可多選）
let searchKeyword = '';  // 搜尋關鍵字

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
  loadTodos();
  // 標籤選擇（新增/編輯彈窗用）
  document.querySelectorAll('.tag-option').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.tag-option').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      selectedTag = el.dataset.tag;
    });
  });
  // 篩選 chip
  document.querySelectorAll('.filter-chip').forEach(el => {
    el.addEventListener('click', () => {
      const tag = el.dataset.filter;
      if (activeFilters.includes(tag)) {
        activeFilters = activeFilters.filter(t => t !== tag);
        el.classList.remove('active');
      } else {
        activeFilters.push(tag);
        el.classList.add('active');
      }
      updateFilterClearBtn();
      renderTodos();
    });
  });
  // 搜尋框
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchKeyword = e.target.value.trim().toLowerCase();
    updateFilterClearBtn();
    renderTodos();
  });
});

function updateFilterClearBtn() {
  const hasFilter = activeFilters.length > 0 || searchKeyword !== '';
  document.getElementById('filterClear').style.display = hasFilter ? 'inline-block' : 'none';
}

function clearAllFilters() {
  activeFilters = [];
  searchKeyword = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('active'));
  updateFilterClearBtn();
  renderTodos();
}

// 套用篩選 + 搜尋
function applyFilters(list) {
  return list.filter(t => {
    // 分類篩選
    if (activeFilters.length > 0 && !activeFilters.includes(t.tag)) return false;
    // 搜尋
    if (searchKeyword) {
      const hay = (t.title + ' ' + (t.note || '')).toLowerCase();
      if (!hay.includes(searchKeyword)) return false;
    }
    return true;
  });
}

// 7 天前的時間戳
function isWithin7Days(dateStr) {
  if (!dateStr) return true;
  try {
    const d = new Date(dateStr.replace(/-/g, '/'));
    const now = new Date();
    const diff = (now - d) / (1000 * 60 * 60 * 24);
    return diff <= 7;
  } catch (e) { return true; }
}

// ==================== 載入任務 ====================
async function loadTodos() {
  try {
    const res = await fetch(GAS_URL + '?action=getTodos&t=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      todos = data.todos || [];
      renderTodos();
    } else {
      showToast('載入失敗：' + (data.msg || ''));
    }
  } catch (err) {
    showToast('網路錯誤，請稍後再試');
    console.error(err);
  } finally {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('todoContent').style.display = 'block';
  }
}

// ==================== 渲染 ====================
function renderTodos() {
  // 先套用篩選+搜尋
  const filtered = applyFilters(todos);

  const pinned = filtered.filter(t => t.status === 'todo' && t.pinned);
  const pending = filtered.filter(t => t.status === 'todo' && !t.pinned);
  // 已完成：套用 7 天自動隱藏
  let done = filtered.filter(t => t.status === 'done' && isWithin7Days(t.completedAt));

  // 置頂區
  document.getElementById('pinnedCount').textContent = pinned.length;
  document.getElementById('pinnedSection').style.display = pinned.length ? 'block' : 'none';
  document.getElementById('pinnedList').innerHTML = pinned.map(renderCard).join('') || '';

  // 待辦區
  document.getElementById('todoCount').textContent = pending.length;
  const hasFilter = activeFilters.length > 0 || searchKeyword !== '';
  document.getElementById('todoList').innerHTML = pending.length
    ? pending.map(renderCard).join('')
    : '<div class="empty-state">' + (hasFilter ? '🔍 沒有符合條件的任務' : '🎉 沒有待辦任務！') + '</div>';

  // 已完成區（7 天自動隱藏）
  document.getElementById('doneCount').textContent = done.length;
  document.getElementById('doneSection').style.display = done.length ? 'block' : 'none';
  done.sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));
  document.getElementById('doneList').innerHTML = done.slice(0, 20).map(renderCard).join('');
}

function renderCard(todo) {
  const pinnedClass = todo.pinned ? ' pinned' : '';
  const doneClass = todo.status === 'done' ? ' done' : '';
  const tagClass = getTagClass(todo.tag);
  const noteHtml = todo.note ? '<div class="todo-note">' + escapeHtml(todo.note) + '</div>' : '';
  const timeHtml = todo.status === 'done' && todo.completedAt
    ? '<div class="todo-time">✅ ' + todo.completedAt.substring(5, 16) + '</div>'
    : todo.createdAt
    ? '<div class="todo-time">📅 ' + todo.createdAt.substring(5, 16) + '</div>'
    : '';

  const actionsHtml = todo.status === 'done'
    ? '<div class="todo-actions">' +
      '<button class="todo-btn copy" onclick="event.stopPropagation();duplicateTodo(\'' + todo.id + '\')" title="複製">📋</button>' +
      '<button class="todo-btn del" onclick="event.stopPropagation();deleteTodo(\'' + todo.id + '\')">🗑️</button>' +
      '</div>'
    : '<div class="todo-actions">' +
      '<button class="todo-btn pin" onclick="event.stopPropagation();togglePin(\'' + todo.id + '\', ' + (!todo.pinned) + ')">' + (todo.pinned ? '📌' : '📍') + '</button>' +
      '<button class="todo-btn copy" onclick="event.stopPropagation();duplicateTodo(\'' + todo.id + '\')" title="複製">📋</button>' +
      '<button class="todo-btn del" onclick="event.stopPropagation();deleteTodo(\'' + todo.id + '\')">🗑️</button>' +
      '</div>';

  return '' +
    '<div class="todo-card' + pinnedClass + doneClass + '">' +
      '<div class="todo-checkbox" onclick="event.stopPropagation();toggleDone(\'' + todo.id + '\', \'' + todo.status + '\')">' +
        (todo.status === 'done' ? '✓' : '') +
      '</div>' +
      '<div class="todo-content" onclick="openEditModal(\'' + todo.id + '\')">' +
        (todo.tag ? '<div class="todo-tag ' + tagClass + '">' + escapeHtml(todo.tag) + '</div>' : '') +
        '<div class="todo-title">' + escapeHtml(todo.title) + '</div>' +
        noteHtml +
        timeHtml +
      '</div>' +
      actionsHtml +
    '</div>';
}

function getTagClass(tag) {
  if (tag.includes('主系統')) return 'red';
  if (tag.includes('購物')) return 'blue';
  if (tag.includes('尊爵')) return 'purple';
  return 'gray';
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

// ==================== 操作 ====================
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '新增任務';
  document.getElementById('modalTitle').classList.remove('edit-mode');
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputNote').value = '';
  document.getElementById('editDeleteBtn').style.display = 'none';
  selectedTag = '';
  document.querySelectorAll('.tag-option').forEach(e => e.classList.remove('selected'));
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('inputTitle').focus(), 100);
}

// 編輯模式
function openEditModal(id) {
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '編輯任務';
  document.getElementById('modalTitle').classList.add('edit-mode');
  document.getElementById('inputTitle').value = todo.title || '';
  document.getElementById('inputNote').value = todo.note || '';
  document.getElementById('editDeleteBtn').style.display = 'block';
  selectedTag = todo.tag || '';
  document.querySelectorAll('.tag-option').forEach(e => {
    e.classList.toggle('selected', e.dataset.tag === todo.tag);
  });
  document.getElementById('modalOverlay').classList.add('active');
}

// 從編輯彈窗刪除
async function deleteFromEdit() {
  if (!editingId) return;
  if (!confirm('確定要刪除這個任務嗎？')) return;
  closeModal();
  await deleteTodo(editingId);
}

// 複製任務
async function duplicateTodo(id) {
  const todo = todos.find(t => t.id === id);
  if (!todo) return;
  try {
    const params = new URLSearchParams({
      action: 'addTodo',
      title: todo.title + '（複製）',
      tag: todo.tag || '',
      note: todo.note || '',
    });
    const res = await fetch(GAS_URL + '?' + params.toString(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      showToast('📋 已複製');
      await loadTodos();
    }
  } catch (err) { showToast('複製失敗'); }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

async function saveTodo() {
  const title = document.getElementById('inputTitle').value.trim();
  const note = document.getElementById('inputNote').value.trim();
  if (!title) { showToast('請輸入任務標題'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '儲存中...';

  try {
    let params;
    if (editingId) {
      // 編輯模式
      params = new URLSearchParams({
        action: 'updateTodo',
        id: editingId,
        title: title,
        tag: selectedTag,
        note: note,
      });
    } else {
      // 新增模式
      params = new URLSearchParams({
        action: 'addTodo',
        title: title,
        tag: selectedTag,
        note: note,
      });
    }
    const res = await fetch(GAS_URL + '?' + params.toString(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      showToast(editingId ? '✏️ 已更新' : '✨ 已新增');
      closeModal();
      await loadTodos();
    } else {
      showToast('儲存失敗：' + (data.msg || ''));
    }
  } catch (err) {
    showToast('網路錯誤');
  } finally {
    btn.disabled = false;
    btn.textContent = '儲存';
  }
}

async function toggleDone(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'todo' : 'done';
  try {
    const params = new URLSearchParams({ action: 'updateTodo', id: id, status: newStatus });
    const res = await fetch(GAS_URL + '?' + params.toString(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      showToast(newStatus === 'done' ? '🎉 完成！' : '↩️ 已取消完成');
      await loadTodos();
    }
  } catch (err) { showToast('操作失敗'); }
}

async function togglePin(id, pin) {
  try {
    const params = new URLSearchParams({ action: 'updateTodo', id: id, pinned: pin });
    const res = await fetch(GAS_URL + '?' + params.toString(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      showToast(pin ? '🔥 已置頂' : '已取消置頂');
      await loadTodos();
    }
  } catch (err) { showToast('操作失敗'); }
}

async function deleteTodo(id) {
  if (!confirm('確定要刪除這個任務嗎？')) return;
  try {
    const params = new URLSearchParams({ action: 'deleteTodo', id: id });
    const res = await fetch(GAS_URL + '?' + params.toString(), { cache: 'no-store' });
    const data = await res.json();
    if (data.ok) {
      showToast('已刪除');
      await loadTodos();
    }
  } catch (err) { showToast('操作失敗'); }
}

// ==================== 提示 ====================
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// 點背景關閉彈窗
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'modalOverlay') closeModal();
});
document.getElementById('importModalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'importModalOverlay') closeImportModal();
});

// ==================== 批次匯入 ====================
function openImportModal() {
  document.getElementById('importText').value = '';
  document.getElementById('importProgress').style.display = 'none';
  document.getElementById('importProgress').textContent = '';
  document.getElementById('importModalOverlay').classList.add('active');
}

function closeImportModal() {
  document.getElementById('importModalOverlay').classList.remove('active');
}

async function doImport() {
  const raw = document.getElementById('importText').value.trim();
  if (!raw) { showToast('請貼上 JSON 內容'); return; }

  let items;
  try {
    items = JSON.parse(raw);
    if (!Array.isArray(items)) throw new Error('JSON 必須是陣列 []');
  } catch (err) {
    showToast('JSON 格式錯誤：' + err.message);
    return;
  }

  const btn = document.getElementById('importBtn');
  const progress = document.getElementById('importProgress');
  btn.disabled = true;
  btn.textContent = '匯入中...';
  progress.style.display = 'block';

  let success = 0;
  let failed = 0;

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    progress.textContent = `進度 ${i + 1} / ${items.length}：${item.title || '(無標題)'}`;
    try {
      // 第一步：新增任務
      const addParams = new URLSearchParams({
        action: 'addTodo',
        title: item.title || '(未命名)',
        tag: item.tag || '',
        note: item.note || '',
        pinned: item.pinned === true ? 'true' : 'false',
      });
      const addRes = await fetch(GAS_URL + '?' + addParams.toString(), { cache: 'no-store' });
      const addData = await addRes.json();
      if (!addData.ok) throw new Error(addData.msg || '新增失敗');

      // 第二步：如果 status=done，立刻標記完成
      if (item.status === 'done' && addData.id) {
        const updParams = new URLSearchParams({
          action: 'updateTodo',
          id: addData.id,
          status: 'done',
        });
        await fetch(GAS_URL + '?' + updParams.toString(), { cache: 'no-store' });
      }
      success++;
    } catch (err) {
      failed++;
      console.error('匯入失敗:', item.title, err);
    }
  }

  progress.textContent = `✅ 完成！成功 ${success} 筆，失敗 ${failed} 筆`;
  showToast(`🎉 匯入 ${success} 筆${failed ? '，失敗 ' + failed : ''}`);

  btn.disabled = false;
  btn.textContent = '匯入';

  // 重新載入清單
  setTimeout(async () => {
    await loadTodos();
    closeImportModal();
  }, 1500);
}

// ==================== 💬 產生 Claude 指令 ====================

  const text = generateClaudePrompt();
  document.getElementById('claudeText').value = text;
  document.getElementById('claudeModalOverlay').classList.add('active');
}

function closeClaudeModal() {
  document.getElementById('claudeModalOverlay').classList.remove('active');
}

function generateClaudePrompt() {

  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  const weekNames = ['日', '一', '二', '三', '四', '五', '六'];
  const weekday = weekNames[now.getDay()];

  // 統計目前進度
  const pinned = todos.filter(t => t.status === 'todo' && t.pinned);
  const pending = todos.filter(t => t.status === 'todo' && !t.pinned);
  const done = todos.filter(t => t.status === 'done');

  // 今日已完成（今天的日期）
  const todayDone = done.filter(t => (t.completedAt || '').startsWith(dateStr));

  // 產出文字
  let text = '';
  text += '嗨 Claude，我是 Elsa（UNI髮型設計沙龍一人工作室老闆）。\n';
  text += '今天是 ' + dateStr + '（' + weekday + '）。\n';
  text += '\n';
  text += '=== 我的進度追蹤 API（請先撈資料了解進度）===\n';
  text += GAS_URL + '?action=getTodos\n';
  text += '\n';
  text += '=== 我的工作原則（必讀，以此為基準效率，只能更好）===\n';
  text += '1. 絕不動舊系統，新功能「包一層」方式加\n';
  text += '2. 一次一個開發任務，避免半成品堆積\n';
  text += '3. 檔案必須明確標示系統：🔴 主系統 / 🔵 購物 / 🟣 尊爵\n';
  text += '4. 完整檔案交付，一鍵複製上傳（不給片段）\n';
  text += '5. 每次完成必附會議記錄：改了什麼 / 哪些檔案 / 下一步\n';
  text += '6. 估時必切開「我產出」與「你操作」\n';
  text += '7. 不給藉口，直接給最快解法（要圖叫她找 Gemini）\n';
  text += '8. 需要檔案主動說哪個系統哪個檔，不讓 Elsa 猜\n';
  text += '9. 不問「要不要休息」，Elsa 做到斷電為止\n';
  text += '10. 開工前複述計畫，用 Code Execution 精準整合\n';
  text += '\n';
  text += '=== 目前系統狀態 ===\n';
  text += '• 主系統：已做電話防護 + 防撞單 + Push→Reply 改造\n';
  text += '• LINE 額度：已用 reply 改造，預估新月 ~155 則（200 免費）\n';
  text += '• Rich Menu：三頁切換已測通\n';
  text += '• 進度追蹤：此系統獨立運作中\n';
  text += '\n';
  text += '=== 絕對禁區 ===\n';
  text += '• 不碰追蹤關懷系統（sendLineFollowUp）\n';
  text += '• 不碰尊爵 VIP GAS\n';
  text += '• 不動電話防護機制\n';
  text += '• 不給「部分程式碼」\n';
  text += '\n';
  text += '=== 今日進度摘要 ===\n';
  text += '🔥 今天必做：' + pinned.length + ' 筆\n';
  pinned.forEach(t => { text += '   • [' + (t.tag || '') + '] ' + t.title + '\n'; });
  text += '📋 待辦：' + pending.length + ' 筆\n';
  pending.slice(0, 5).forEach(t => { text += '   • [' + (t.tag || '') + '] ' + t.title + '\n'; });
  if (pending.length > 5) text += '   ...（還有 ' + (pending.length - 5) + ' 筆）\n';
  text += '✅ 今日已完成：' + todayDone.length + ' 筆\n';
  todayDone.forEach(t => { text += '   • [' + (t.tag || '') + '] ' + t.title + '\n'; });
  text += '\n';
  text += '=== 我現在想做 ===\n';
  text += '（請在這行下方寫你今天想做什麼）\n';

  return text;
}

async function copyClaudeText() {
  const text = document.getElementById('claudeText').value;
  const btn = document.getElementById('copyClaudeBtn');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = '✅ 已複製';
    showToast('📋 已複製到剪貼簿，貼到新對話即可！');
    setTimeout(() => { btn.textContent = '📋 複製'; }, 2000);
  } catch (err) {
    // 備用方案：選取文字讓使用者手動複製
    const textarea = document.getElementById('claudeText');
    textarea.select();
    textarea.setSelectionRange(0, 99999);
    document.execCommand('copy');
    btn.textContent = '✅ 已複製';
    showToast('📋 已複製！');
    setTimeout(() => { btn.textContent = '📋 複製'; }, 2000);
  }
}

// 點背景關閉
document.getElementById('claudeModalOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'claudeModalOverlay') closeClaudeModal();
});
